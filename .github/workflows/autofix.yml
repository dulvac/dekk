name: Autofix

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to fix'
        required: true
        type: number
      model_override:
        description: 'Override the default Claude model (Bedrock model ID)'
        required: false
        type: string
      max_turns_override:
        description: 'Override the maximum number of agent turns (default: 100)'
        required: false
        type: number
      pr_number:
        description: 'PR number to revise (enables revision mode)'
        required: false
        type: number

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  classify:
    runs-on: ubuntu-latest
    # Only run when the 'autofix' label is applied (requires triage+ access),
    # or via manual workflow_dispatch (requires write access)
    if: >-
      !github.event.inputs.pr_number &&
      (github.event_name == 'workflow_dispatch' || github.event.label.name == 'autofix')
    outputs:
      issue_type: ${{ steps.classify.outputs.issue_type }}
      issue_number: ${{ steps.classify.outputs.issue_number }}
      issue_title: ${{ steps.classify.outputs.issue_title }}
      issue_body: ${{ steps.classify.outputs.issue_body }}
      is_visual: ${{ steps.classify.outputs.is_visual }}
      should_run: ${{ steps.classify.outputs.should_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify sender has write access
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SENDER_LOGIN: ${{ github.event.sender.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          PERMISSION=$(gh api "repos/${REPO}/collaborators/${SENDER_LOGIN}/permission" --jq '.permission')
          if [[ "$PERMISSION" != "write" && "$PERMISSION" != "admin" ]]; then
            echo "::error::User ${SENDER_LOGIN} does not have write access (permission: $PERMISSION). Removing autofix label."
            gh issue edit "$ISSUE_NUMBER" --remove-label "autofix"
            exit 1
          fi

      - name: Get issue data
        id: issue-data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER_EVENT: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          ISSUE_NUMBER="$ISSUE_NUMBER_EVENT"
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

          ISSUE_JSON=$(gh issue view "$ISSUE_NUMBER" --json title,body,labels)
          echo "issue_title=$(echo "$ISSUE_JSON" | jq -r '.title')" >> "$GITHUB_OUTPUT"

          echo "$ISSUE_JSON" | jq -r '.body' > /tmp/issue_body.txt
          DELIM="ISSUE_BODY_DELIM_$(date +%s%N)"
          {
            echo "issue_body<<${DELIM}"
            cat /tmp/issue_body.txt
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

          LABELS=$(echo "$ISSUE_JSON" | jq -r '[.labels[].name] | join(",")')
          echo "labels=${LABELS}" >> "$GITHUB_OUTPUT"

      - name: Check issue state
        id: check-state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue-data.outputs.issue_number }}
        run: |
          STATE=$(gh issue view "$ISSUE_NUMBER" --json state -q '.state')
          if [ "$STATE" != "OPEN" ]; then
            echo "Issue is not open (state: $STATE). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Classify issue
        id: classify
        if: steps.check-state.outputs.skip != 'true'
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          PREV_ISSUE_BODY: ${{ steps.issue-data.outputs.issue_body }}
          ISSUE_NUMBER: ${{ steps.issue-data.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue-data.outputs.issue_title }}
          LABELS: ${{ steps.issue-data.outputs.labels }}
        run: |

          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "issue_title=${ISSUE_TITLE}" >> "$GITHUB_OUTPUT"
          DELIM="ISSUE_BODY_DELIM_$(date +%s%N)"
          {
            echo "issue_body<<${DELIM}"
            echo "$PREV_ISSUE_BODY"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

          ISSUE_TYPE=""

          if echo "$LABELS" | grep -iqE '(^|,)(bug|defect|broken|regression)(,|$)'; then
            ISSUE_TYPE="bug"
          fi

          if [ -z "$ISSUE_TYPE" ]; then
            if echo "$LABELS" | grep -iqE '(^|,)(feature|enhancement|request)(,|$)'; then
              ISSUE_TYPE="feature"
            fi
          fi

          if [ -z "$ISSUE_TYPE" ]; then
            if echo "$ISSUE_TITLE" | grep -iqE '^\[(bug|fix)\]'; then
              ISSUE_TYPE="bug"
            elif echo "$ISSUE_TITLE" | grep -iqE '^\[(feat|feature|request|enhancement)\]'; then
              ISSUE_TYPE="feature"
            fi
          fi

          if [ -z "$ISSUE_TYPE" ]; then
            npm install -g @anthropic-ai/claude-code@latest 2>/dev/null
            CLASSIFICATION=$(claude --print \
              --model "us.anthropic.claude-sonnet-4-6" \
              "Classify this GitHub issue as exactly one of: bug, feature, skip. Reply with ONLY that single word, nothing else.

              Title: ${ISSUE_TITLE}
              Body: $(cat /tmp/issue_body.txt | head -c 2000)
              Labels: ${LABELS}")

            CLASSIFICATION=$(echo "$CLASSIFICATION" | tr '[:upper:]' '[:lower:]' | xargs)
            case "$CLASSIFICATION" in
              bug|feature|skip) ISSUE_TYPE="$CLASSIFICATION" ;;
              *) ISSUE_TYPE="skip" ;;
            esac
          fi

          SCOPE="all"
          if [ "$SCOPE" = "bugs" ] && [ "$ISSUE_TYPE" = "feature" ]; then
            echo "Issue classified as feature, but scope is bugs-only. Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "issue_type=${ISSUE_TYPE}" >> "$GITHUB_OUTPUT"
            echo "is_visual=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$ISSUE_TYPE" = "skip" ]; then
            echo "Issue classified as skip. Not actionable."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "issue_type=${ISSUE_TYPE}" >> "$GITHUB_OUTPUT"
            echo "is_visual=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Detect if issue involves visual/UI changes
          IS_VISUAL="false"
          if echo "$LABELS" | grep -iqE '(^|,)(ui|ux|visual|css|style|design|frontend|layout)(,|$)'; then
            IS_VISUAL="true"
          elif echo "$ISSUE_TITLE" | grep -iqE '\b(ui|ux|visual|css|style|layout|button|modal|dialog|responsive|font|color|theme|sidebar|navbar|header|footer|card|toast|tooltip|animation|spacing|padding|margin)\b'; then
            IS_VISUAL="true"
          elif cat /tmp/issue_body.txt | head -c 2000 | grep -iqE '\b(screenshot|visual|looks wrong|layout broken|misaligned|pixel|render|display issue|styling|css)\b'; then
            IS_VISUAL="true"
          fi
          echo "is_visual=${IS_VISUAL}" >> "$GITHUB_OUTPUT"

          echo "Issue classified as: ${ISSUE_TYPE} (visual: ${IS_VISUAL})"
          echo "issue_type=${ISSUE_TYPE}" >> "$GITHUB_OUTPUT"
          echo "should_run=true" >> "$GITHUB_OUTPUT"

  fix:
    needs: classify
    if: >-
      always() &&
      !cancelled() &&
      (needs.classify.outputs.should_run == 'true' || github.event.inputs.pr_number != '')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: autofix-fix-${{ needs.classify.outputs.issue_number || github.event.inputs.pr_number }}
      cancel-in-progress: true
    env:
      CLAUDE_CODE_USE_BEDROCK: "1"
      AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      GH_TOKEN: ${{ secrets.AUTOFIX_PAT }}
      ANTHROPIC_MODEL: ${{ github.event.inputs.model_override || 'us.anthropic.claude-opus-4-6-v1' }}
      CLAUDE_MAX_TURNS: ${{ github.event.inputs.max_turns_override || '100' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AUTOFIX_PAT }}

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}"

      - name: Resolve and checkout PR branch (revision mode)
        if: github.event.inputs.pr_number != ''
        id: pr-branch
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_PAT }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |

          # Verify PR has autofix label
          HAS_LABEL=$(gh pr view "$PR_NUMBER" --json labels -q '.labels[].name' | grep -c '^autofix$' || true)
          if [ "$HAS_LABEL" -eq 0 ]; then
            echo "::error::PR #${PR_NUMBER} does not have the 'autofix' label. Skipping."
            gh pr comment "$PR_NUMBER" --body "This PR was not created by autofix. The \`/autofix retry\` command only works on autofix-generated PRs."
            exit 1
          fi

          # Verify PR is open
          PR_STATE=$(gh pr view "$PR_NUMBER" --json state -q '.state')
          if [ "$PR_STATE" != "OPEN" ]; then
            echo "::error::PR #${PR_NUMBER} is not open (state: ${PR_STATE}). Skipping."
            exit 1
          fi

          # Checkout PR branch
          PR_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName -q '.headRefName')
          git checkout "$PR_BRANCH"
          git pull origin "$PR_BRANCH"
          echo "pr_branch=${PR_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Gather review context (revision mode)
        if: github.event.inputs.pr_number != ''
        id: review-context
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_PAT }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          REPO: ${{ github.repository }}
        run: |

          # Get PR diff
          gh pr diff "$PR_NUMBER" > /tmp/pr_diff.txt

          # Get inline review comments
          gh api "repos/${REPO}/pulls/${PR_NUMBER}/comments" \
            --jq '.[] | "File: \(.path):\(.line // .original_line)\nComment: \(.body)\n---"' \
            > /tmp/review_comments.txt 2>/dev/null || echo "No inline comments." > /tmp/review_comments.txt

          # Get PR conversation comments
          gh pr view "$PR_NUMBER" --comments --json comments \
            --jq '.comments[] | "Author: \(.author.login)\n\(.body)\n---"' \
            > /tmp/pr_comments.txt 2>/dev/null || echo "No PR comments." > /tmp/pr_comments.txt

          # Get original issue context
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title -q '.title' 2>/dev/null || echo "Unknown")
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q '.body' 2>/dev/null || echo "No issue body available.")
          echo "$ISSUE_TITLE" > /tmp/original_issue_title.txt
          echo "$ISSUE_BODY" > /tmp/original_issue_body.txt

          # Track revision rounds
          MAX_REVISIONS=$(grep -oE 'gg:autofix-max-revisions=[0-9]+' DEVELOPMENT.md | grep -oE '[0-9]+' || echo "5")
          REVISION_ROUND=$(gh pr view "$PR_NUMBER" --comments --json comments \
            --jq '[.comments[] | select(.body | startswith("## Autofix Revision"))] | length')
          REVISION_ROUND=$((REVISION_ROUND + 1))

          echo "revision_round=${REVISION_ROUND}" >> "$GITHUB_OUTPUT"
          echo "max_revisions=${MAX_REVISIONS}" >> "$GITHUB_OUTPUT"

          REVISION_WARNING=""
          if [ "$REVISION_ROUND" -ge "$MAX_REVISIONS" ]; then
            REVISION_WARNING="WARNING: This is revision round ${REVISION_ROUND}, at or beyond the configured limit of ${MAX_REVISIONS}. Consider whether this PR needs human intervention."
            gh pr comment "$PR_NUMBER" --body "> **Warning:** This is revision round ${REVISION_ROUND}, at or beyond the configured limit of ${MAX_REVISIONS}. Consider whether this PR needs human intervention."
          fi
          echo "$REVISION_WARNING" > /tmp/revision_warning.txt

      - name: Add autofix-running label
        if: github.event.inputs.pr_number == ''
        env:
          ISSUE_NUMBER: ${{ needs.classify.outputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "autofix-running"

      - name: Check for existing autofix PR
        if: github.event.inputs.pr_number == ''
        id: check-existing
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_PAT }}
          ISSUE_NUMBER: ${{ needs.classify.outputs.issue_number }}
          REPO: ${{ github.repository }}
        run: |
          # Search by branch name pattern (handles both fix/ and feat/ prefixes)
          EXISTING_PR_NUMBER=$(gh pr list --label "autofix" --state open --json number,headRefName \
            -q ".[] | select(.headRefName | test(\"issue-${ISSUE_NUMBER}-\")) | .number" | head -1)

          if [ -z "$EXISTING_PR_NUMBER" ]; then
            echo "No existing autofix PR found."
            echo "existing_pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found existing autofix PR #${EXISTING_PR_NUMBER}. Entering revision mode."
          echo "existing_pr_number=${EXISTING_PR_NUMBER}" >> "$GITHUB_OUTPUT"

          # Checkout the existing PR branch
          PR_BRANCH=$(gh pr view "$EXISTING_PR_NUMBER" --json headRefName -q '.headRefName')
          git checkout "$PR_BRANCH"
          git pull origin "$PR_BRANCH"

          # Gather review context (same as explicit revision mode)
          gh pr diff "$EXISTING_PR_NUMBER" > /tmp/pr_diff.txt

          gh api "repos/${REPO}/pulls/${EXISTING_PR_NUMBER}/comments" \
            --jq '.[] | "File: \(.path):\(.line // .original_line)\nComment: \(.body)\n---"' \
            > /tmp/review_comments.txt 2>/dev/null || echo "No inline comments." > /tmp/review_comments.txt

          gh pr view "$EXISTING_PR_NUMBER" --comments --json comments \
            --jq '.comments[] | "Author: \(.author.login)\n\(.body)\n---"' \
            > /tmp/pr_comments.txt 2>/dev/null || echo "No PR comments." > /tmp/pr_comments.txt

          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title -q '.title' 2>/dev/null || echo "Unknown")
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q '.body' 2>/dev/null || echo "")
          echo "$ISSUE_TITLE" > /tmp/original_issue_title.txt
          echo "$ISSUE_BODY" > /tmp/original_issue_body.txt

          # Track revision rounds
          MAX_REVISIONS=$(grep -oE 'gg:autofix-max-revisions=[0-9]+' DEVELOPMENT.md | grep -oE '[0-9]+' || echo "5")
          REVISION_ROUND=$(gh pr view "$EXISTING_PR_NUMBER" --comments --json comments \
            --jq '[.comments[] | select(.body | startswith("## Autofix Revision"))] | length')
          REVISION_ROUND=$((REVISION_ROUND + 1))
          echo "revision_round=${REVISION_ROUND}" >> "$GITHUB_OUTPUT"
          echo "max_revisions=${MAX_REVISIONS}" >> "$GITHUB_OUTPUT"

      - name: Create feature branch
        if: github.event.inputs.pr_number == '' && steps.check-existing.outputs.existing_pr_number == ''
        id: branch
        env:
          ISSUE_NUMBER: ${{ needs.classify.outputs.issue_number }}
          ISSUE_TYPE: ${{ needs.classify.outputs.issue_type }}
          ISSUE_TITLE: ${{ needs.classify.outputs.issue_title }}
        run: |

          SHORT_DESC=$(echo "$ISSUE_TITLE" \
            | sed 's/\[.*\]//g' \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9 ]//g' \
            | xargs \
            | tr ' ' '-' \
            | cut -c1-40)

          if [ "$ISSUE_TYPE" = "bug" ]; then
            BRANCH="fix/issue-${ISSUE_NUMBER}-${SHORT_DESC}"
          else
            BRANCH="feat/issue-${ISSUE_NUMBER}-${SHORT_DESC}"
          fi

          git checkout -B "$BRANCH"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Detect and install toolchain
        run: |
          if [ -f "package-lock.json" ] || [ -f "yarn.lock" ] || [ -f "pnpm-lock.yaml" ]; then
            if [ -f ".nvmrc" ] || [ -f ".node-version" ]; then
              NODE_VERSION=$(cat .nvmrc .node-version 2>/dev/null | head -1)
              curl -fsSL https://fnm.vercel.app/install | bash
              export PATH="$HOME/.local/share/fnm:$PATH"
              eval "$(fnm env)"
              fnm install "$NODE_VERSION"
              fnm use "$NODE_VERSION"
            fi
            if [ -f "package-lock.json" ]; then
              npm ci
            elif [ -f "yarn.lock" ]; then
              npm install -g yarn && yarn install --frozen-lockfile
            elif [ -f "pnpm-lock.yaml" ]; then
              npm install -g pnpm && pnpm install --frozen-lockfile
            fi
          fi

          if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            python3 -m pip install --upgrade pip
            if [ -f "requirements.txt" ]; then
              pip install -r requirements.txt
            elif [ -f "pyproject.toml" ]; then
              pip install -e ".[dev]" 2>/dev/null || pip install -e .
            fi
          fi

          if [ -f "pom.xml" ]; then
            echo "Maven project detected"
          fi

          if [ -f "go.mod" ]; then
            echo "Go project detected"
          fi

          if [ -f "Cargo.toml" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            export PATH="$HOME/.cargo/bin:$PATH"
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Run Claude Code
        id: claude
        env:
          ISSUE_BODY_INPUT: ${{ needs.classify.outputs.issue_body }}
          CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number || steps.check-existing.outputs.existing_pr_number }}
          INPUT_ISSUE_NUMBER: ${{ github.event.inputs.issue_number || needs.classify.outputs.issue_number }}
          CLASSIFY_ISSUE_NUMBER: ${{ needs.classify.outputs.issue_number }}
          CLASSIFY_ISSUE_TYPE: ${{ needs.classify.outputs.issue_type }}
          CLASSIFY_ISSUE_TITLE: ${{ needs.classify.outputs.issue_title }}
          CLASSIFY_IS_VISUAL: ${{ needs.classify.outputs.is_visual }}
          REVIEW_REVISION_ROUND: ${{ steps.review-context.outputs.revision_round || steps.check-existing.outputs.revision_round }}
          REVIEW_MAX_REVISIONS: ${{ steps.review-context.outputs.max_revisions || steps.check-existing.outputs.max_revisions }}
        run: |
          AUTOFIX_INSTRUCTIONS=$(cat .claude/autofix-instructions.md 2>/dev/null || echo "No autofix instructions found.")

          IS_REVISION="$INPUT_PR_NUMBER"

          if [ -n "$IS_REVISION" ]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
            ISSUE_NUMBER="$INPUT_ISSUE_NUMBER"
            ISSUE_TITLE=$(cat /tmp/original_issue_title.txt)
            ISSUE_BODY=$(cat /tmp/original_issue_body.txt)
            PR_DIFF=$(cat /tmp/pr_diff.txt | head -c 50000)
            REVIEW_COMMENTS=$(cat /tmp/review_comments.txt | head -c 20000)
            PR_COMMENTS=$(cat /tmp/pr_comments.txt | head -c 20000)
            REVISION_ROUND="$REVIEW_REVISION_ROUND"
            MAX_REVISIONS="$REVIEW_MAX_REVISIONS"
            REVISION_WARNING=$(cat /tmp/revision_warning.txt)

            PROMPT=$(cat <<PROMPT_EOF
          You are revising PR #${PR_NUMBER} based on reviewer feedback.

          **Original issue:** #${ISSUE_NUMBER} — ${ISSUE_TITLE}
          ${ISSUE_BODY}

          **Your previous changes (PR diff):**
          ${PR_DIFF}

          **Reviewer feedback (inline comments):**
          ${REVIEW_COMMENTS}

          **Reviewer feedback (PR comments):**
          ${PR_COMMENTS}

          --- AUTOFIX INSTRUCTIONS ---
          ${AUTOFIX_INSTRUCTIONS}
          --- END AUTOFIX INSTRUCTIONS ---

          Read the reviewer feedback carefully. Make the requested changes by adding NEW commits
          (do not rewrite history). If feedback is contradictory or unclear, use your best judgment
          and explain your reasoning in the commit message.

          This is revision round ${REVISION_ROUND} of ${MAX_REVISIONS}.
          ${REVISION_WARNING}
          PROMPT_EOF
          )
          else
            ISSUE_NUMBER="$CLASSIFY_ISSUE_NUMBER"
            ISSUE_TYPE="$CLASSIFY_ISSUE_TYPE"
            ISSUE_TITLE="$CLASSIFY_ISSUE_TITLE"
            ISSUE_BODY="$ISSUE_BODY_INPUT"

            IS_VISUAL="$CLASSIFY_IS_VISUAL"
            VISUAL_HINT=""
            if [ "$IS_VISUAL" = "true" ]; then
              VISUAL_HINT="
          **This issue has been classified as visual/UI-related.** Follow the Visual QA instructions in the autofix instructions below. Capture before-state screenshots BEFORE making changes, then capture after-state screenshots AFTER changes are complete. Save all screenshots to the paths specified in the instructions."
            fi

            PROMPT=$(cat <<PROMPT_EOF
          You are resolving GitHub issue #${ISSUE_NUMBER}.

          **Issue type:** ${ISSUE_TYPE}
          **Title:** ${ISSUE_TITLE}
          **Body:**
          ${ISSUE_BODY}
          ${VISUAL_HINT}

          --- AUTOFIX INSTRUCTIONS ---
          ${AUTOFIX_INSTRUCTIONS}
          --- END AUTOFIX INSTRUCTIONS ---

          Read CLAUDE.md, AGENTS.md, and DEVELOPMENT.md for project conventions.

          Implement the fix or feature, commit your changes, and output the AUTOFIX_RESULT block as specified in the instructions above.
          PROMPT_EOF
          )
          fi

          echo "$PROMPT" > /tmp/claude_prompt.txt

          # Stream Claude output to both GH Actions log (formatted) and raw JSONL file
          set +e
          claude --print \
            --model "$ANTHROPIC_MODEL" \
            --max-turns "$CLAUDE_MAX_TURNS" \
            --allowedTools "Read,Edit,Write,Glob,Grep,Bash(*),NotebookEdit,Agent,mcp__context7__*,mcp__playwright__*" \
            --effort high \
            --verbose \
            --output-format stream-json \
            "$PROMPT" 2>/tmp/claude_stderr.txt \
            | tee /tmp/claude_stream.jsonl \
            | jq --unbuffered -r '
              if .type == "assistant" then
                (.message.content[] |
                  if .type == "text" then "\n" + .text
                  elif .type == "tool_use" then "\n[Tool: " + .name + "]\n" + (.input | tostring | .[0:1000])
                  else empty end)
              elif .type == "result" then
                "\n[Result: " + (.result.stop_reason // "unknown") + "]"
              else empty end
            '
          CLAUDE_EXIT=${PIPESTATUS[0]}
          set -e

          # Extract all assistant text messages for AUTOFIX_RESULT parsing
          CLAUDE_OUTPUT=$(jq -r '
            select(.type == "assistant")
            | .message.content[]
            | select(.type == "text")
            | .text
          ' /tmp/claude_stream.jsonl 2>/dev/null || echo "")

          # Save extracted text for failure comments
          echo "$CLAUDE_OUTPUT" > /tmp/claude_output.txt

          if echo "$CLAUDE_OUTPUT" | grep -q "AUTOFIX_RESULT"; then
            STATUS=$(echo "$CLAUDE_OUTPUT" | grep -A20 "AUTOFIX_RESULT" | grep "^status:" | head -1 | awk '{print $2}')
            SUMMARY=$(echo "$CLAUDE_OUTPUT" | grep -A20 "AUTOFIX_RESULT" | grep "^summary:" | head -1 | sed 's/^summary: //')
            ERROR_MSG=$(echo "$CLAUDE_OUTPUT" | grep -A20 "AUTOFIX_RESULT" | grep "^error:" | head -1 | sed 's/^error: //')
            FILES_CHANGED=$(echo "$CLAUDE_OUTPUT" | grep -A20 "AUTOFIX_RESULT" | grep "^files_changed:" | head -1 | awk '{print $2}')
            COMMITS=$(echo "$CLAUDE_OUTPUT" | grep -A20 "AUTOFIX_RESULT" | grep "^commits:" | head -1 | awk '{print $2}')
            TEST_RESULT=$(echo "$CLAUDE_OUTPUT" | grep -A20 "AUTOFIX_RESULT" | grep "^test_result:" | head -1 | awk '{print $2}')
          else
            STATUS="failure"
            SUMMARY="Claude Code did not produce structured output"
            ERROR_MSG="No AUTOFIX_RESULT block found in output. Exit code: ${CLAUDE_EXIT}"
            FILES_CHANGED="0"
            COMMITS="0"
            TEST_RESULT="skipped"
          fi

          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"
          echo "error=${ERROR_MSG}" >> "$GITHUB_OUTPUT"
          echo "files_changed=${FILES_CHANGED}" >> "$GITHUB_OUTPUT"
          echo "commits=${COMMITS}" >> "$GITHUB_OUTPUT"
          echo "test_result=${TEST_RESULT}" >> "$GITHUB_OUTPUT"

      - name: Push branch and create PR
        if: steps.claude.outputs.status == 'success'
        id: pr
        env:
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number || steps.check-existing.outputs.existing_pr_number }}
          INPUT_ISSUE_NUMBER: ${{ github.event.inputs.issue_number || needs.classify.outputs.issue_number }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          CLASSIFY_ISSUE_NUMBER: ${{ needs.classify.outputs.issue_number }}
          CLASSIFY_ISSUE_TYPE: ${{ needs.classify.outputs.issue_type }}
          CLASSIFY_ISSUE_TITLE: ${{ needs.classify.outputs.issue_title }}
          CLAUDE_SUMMARY: ${{ steps.claude.outputs.summary }}
          CLAUDE_FILES_CHANGED: ${{ steps.claude.outputs.files_changed }}
          CLAUDE_COMMITS: ${{ steps.claude.outputs.commits }}
          CLAUDE_TEST_RESULT: ${{ steps.claude.outputs.test_result }}
          PARENT_REPO: ${{ github.repository }}
        run: |
          IS_REVISION="$INPUT_PR_NUMBER"

          if [ -n "$IS_REVISION" ]; then
            # Revision mode: push new commits to existing branch
            PR_NUMBER="$INPUT_PR_NUMBER"
            PR_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName -q '.headRefName')
            PARENT_PR_URL=$(gh pr view "$PR_NUMBER" --json url -q '.url')

            COMMIT_COUNT=$(git log origin/${PR_BRANCH}..HEAD --oneline | wc -l | xargs)
            if [ "$COMMIT_COUNT" -eq 0 ]; then
              echo "No new commits to push."
              echo "pr_created=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            git push origin "$PR_BRANCH"
            echo "pr_url=${PARENT_PR_URL}" >> "$GITHUB_OUTPUT"
            echo "pr_created=true" >> "$GITHUB_OUTPUT"
            echo "is_revision=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ISSUE_NUMBER="$CLASSIFY_ISSUE_NUMBER"
          ISSUE_TYPE="$CLASSIFY_ISSUE_TYPE"
          SUMMARY="$CLAUDE_SUMMARY"
          FILES_CHANGED="$CLAUDE_FILES_CHANGED"
          COMMITS="$CLAUDE_COMMITS"
          TEST_RESULT="$CLAUDE_TEST_RESULT"

          COMMIT_COUNT=$(git log main..HEAD --oneline | wc -l | xargs)
          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "No commits to push."
            echo "pr_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git push -u --force-with-lease origin "$BRANCH"

          if [ "$ISSUE_TYPE" = "bug" ]; then
            PR_TITLE="fix: ${SUMMARY}"
          else
            PR_TITLE="feat: ${SUMMARY}"
          fi

          PR_TITLE=$(echo "$PR_TITLE" | cut -c1-70)

          PR_BODY=$(cat <<PR_EOF
          ## Summary

          ${SUMMARY}

          Fixes #${ISSUE_NUMBER}

          ## Details

          - **Files changed:** ${FILES_CHANGED}
          - **Commits:** ${COMMITS}
          - **Tests:** ${TEST_RESULT}

          ---
          *Automated by gg:autofix*
          PR_EOF
          )

          PR_URL=$(gh pr create \
            --base "main" \
            --head "$BRANCH" \
            --title "$PR_TITLE" \
            --body "$PR_BODY")

          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "pr_created=true" >> "$GITHUB_OUTPUT"

          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          gh pr edit "$PR_NUMBER" --add-label "autofix"

      - name: Comment success on issue
        if: github.event.inputs.pr_number == '' && steps.check-existing.outputs.existing_pr_number == '' && steps.claude.outputs.status == 'success' && steps.pr.outputs.pr_created == 'true'
        env:
          ISSUE_NUMBER: ${{ needs.classify.outputs.issue_number }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          SUMMARY: ${{ steps.claude.outputs.summary }}
          FILES_CHANGED: ${{ steps.claude.outputs.files_changed }}
          COMMITS: ${{ steps.claude.outputs.commits }}
          TEST_RESULT: ${{ steps.claude.outputs.test_result }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          COMMENT=$(cat <<COMMENT_EOF
          ## Autofix — PR Created

          **PR:** ${PR_URL}
          **Files changed:** ${FILES_CHANGED} | **Commits:** ${COMMITS} | **Tests:** ${TEST_RESULT}

          ${SUMMARY}

          ---
          *Automated by gg:autofix | Workflow run: ${WORKFLOW_URL}*
          COMMENT_EOF
          )

          gh issue comment "$ISSUE_NUMBER" --body "$COMMENT"
          gh issue edit "$ISSUE_NUMBER" --add-label "autofix-success"

      - name: Comment failure on issue
        if: github.event.inputs.pr_number == '' && steps.check-existing.outputs.existing_pr_number == '' && (steps.claude.outputs.status != 'success' || (steps.pr.outputs.pr_created == 'false' && steps.claude.outputs.status == 'success'))
        env:
          ISSUE_NUMBER: ${{ needs.classify.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.classify.outputs.issue_title }}
          ISSUE_TYPE: ${{ needs.classify.outputs.issue_type }}
          SUMMARY: ${{ steps.claude.outputs.summary }}
          ERROR_MSG: ${{ steps.claude.outputs.error }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ATTEMPTED=""
          if [ -f /tmp/claude_output.txt ]; then
            ATTEMPTED=$(tail -50 /tmp/claude_output.txt | head -30)
          fi

          COMMENT=$(cat <<COMMENT_EOF
          ## Autofix Report — Failed

          **Issue:** #${ISSUE_NUMBER} — ${ISSUE_TITLE}
          **Type:** ${ISSUE_TYPE}
          **Model:** ${ANTHROPIC_MODEL}

          ### What was attempted

          ${ATTEMPTED:-No output captured.}

          ### Failure reason

          ${ERROR_MSG:-${SUMMARY:-Unknown error}}

          ### Suggested next steps

          - Review the failure details above
          - Add more context to the issue description if needed
          - Run \`/autofix retry\` to try again
          - Run \`/autofix model=<model-id>\` to try with a different model

          ---
          *Workflow run: ${WORKFLOW_URL} | Retry: \`/autofix retry\`*
          COMMENT_EOF
          )

          gh issue comment "$ISSUE_NUMBER" --body "$COMMENT"
          gh issue edit "$ISSUE_NUMBER" --add-label "autofix-failed"
          exit 1

      - name: Comment revision summary on PR
        if: (github.event.inputs.pr_number != '' || steps.check-existing.outputs.existing_pr_number != '') && steps.claude.outputs.status == 'success' && steps.pr.outputs.pr_created == 'true'
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number || steps.check-existing.outputs.existing_pr_number }}
          EXISTING_PR_NUMBER: ${{ steps.check-existing.outputs.existing_pr_number }}
          ISSUE_NUMBER: ${{ needs.classify.outputs.issue_number }}
          SUMMARY: ${{ steps.claude.outputs.summary }}
          FILES_CHANGED: ${{ steps.claude.outputs.files_changed }}
          COMMITS: ${{ steps.claude.outputs.commits }}
          TEST_RESULT: ${{ steps.claude.outputs.test_result }}
          REVISION_ROUND: ${{ steps.review-context.outputs.revision_round || steps.check-existing.outputs.revision_round }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          COMMENT=$(cat <<COMMENT_EOF
          ## Autofix Revision — Round ${REVISION_ROUND}

          **Files changed:** ${FILES_CHANGED} | **New commits:** ${COMMITS} | **Tests:** ${TEST_RESULT}

          ${SUMMARY}

          ---
          *Automated by gg:autofix | Workflow run: ${WORKFLOW_URL}*
          COMMENT_EOF
          )

          gh pr comment "$PR_NUMBER" --body "$COMMENT"

          # Also update the issue when revision was triggered from issue retry
          if [ -n "$EXISTING_PR_NUMBER" ]; then
            PR_URL=$(gh pr view "$PR_NUMBER" --json url -q '.url')
            gh issue comment "$ISSUE_NUMBER" --body "Existing autofix PR updated with new revision: ${PR_URL}"
          fi

      - name: Comment revision failure on PR
        if: (github.event.inputs.pr_number != '' || steps.check-existing.outputs.existing_pr_number != '') && steps.claude.outputs.status != 'success'
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number || steps.check-existing.outputs.existing_pr_number }}
          SUMMARY: ${{ steps.claude.outputs.summary }}
          ERROR_MSG: ${{ steps.claude.outputs.error }}
          REVISION_ROUND: ${{ steps.review-context.outputs.revision_round || steps.check-existing.outputs.revision_round }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ATTEMPTED=""
          if [ -f /tmp/claude_output.txt ]; then
            ATTEMPTED=$(tail -50 /tmp/claude_output.txt | head -30)
          fi

          COMMENT=$(cat <<COMMENT_EOF
          ## Autofix Revision — Round ${REVISION_ROUND} — Failed

          ### What was attempted

          ${ATTEMPTED:-No output captured.}

          ### Failure reason

          ${ERROR_MSG:-${SUMMARY:-Unknown error}}

          ### Suggested next steps

          - Review the failure details above
          - Add more specific feedback in a review comment
          - Run \`/autofix retry\` to try again
          - Consider making the changes manually

          ---
          *Workflow run: ${WORKFLOW_URL} | Retry: \`/autofix retry\`*
          COMMENT_EOF
          )

          gh pr comment "$PR_NUMBER" --body "$COMMENT"

      - name: Upload VQA screenshots to branch
        id: vqa-upload
        if: steps.claude.outputs.status == 'success' && steps.pr.outputs.pr_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_PAT }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          HAS_BEFORE=$(ls /tmp/vqa-before/*.png 2>/dev/null | head -1)
          HAS_AFTER=$(ls /tmp/vqa-after/*.png 2>/dev/null | head -1)

          if [ -z "$HAS_BEFORE" ] && [ -z "$HAS_AFTER" ]; then
            echo "No VQA screenshots found. Skipping."
            echo "has_screenshots=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_screenshots=true" >> "$GITHUB_OUTPUT"

          BRANCH="_vqa-screenshots"
          CLONE_URL="${SERVER_URL}/${REPO}.git"
          AUTH_HEADER="Authorization: Bearer ${GH_TOKEN}"

          WORK_DIR=$(mktemp -d)
          cd "$WORK_DIR"

          # Clone existing branch or create orphan — use extraHeader to avoid leaking token in .git/config
          if git -c "http.extraHeader=$AUTH_HEADER" clone --depth 1 --single-branch --branch "$BRANCH" "$CLONE_URL" repo 2>/dev/null; then
            cd repo
          else
            mkdir repo && cd repo
            git init
            git checkout --orphan "$BRANCH"
            git remote add origin "$CLONE_URL"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Prune old screenshot directories (keep last 20 runs)
          DIRS=$(ls -1d */ 2>/dev/null | sort -n -r | tail -n +21)
          if [ -n "$DIRS" ]; then
            echo "$DIRS" | xargs rm -rf
            git add -A
            git commit -m "Prune old VQA screenshots" || true
          fi

          # Copy screenshots into run-specific directory
          mkdir -p "${RUN_ID}/vqa-before" "${RUN_ID}/vqa-after"
          cp /tmp/vqa-before/*.png "${RUN_ID}/vqa-before/" 2>/dev/null || true
          cp /tmp/vqa-after/*.png "${RUN_ID}/vqa-after/" 2>/dev/null || true

          git add .
          git commit -m "VQA screenshots for run ${RUN_ID}" || { echo "Nothing to commit"; exit 0; }

          # Push with retry for concurrent runs
          git_auth() { git -c "http.extraHeader=${AUTH_HEADER}" "$@"; }
          PUSH_OK=false
          for ATTEMPT in 1 2 3; do
            if git_auth push origin "$BRANCH" 2>/dev/null; then
              PUSH_OK=true
              break
            fi
            echo "Push attempt ${ATTEMPT} failed, rebasing and retrying..."
            git_auth pull --rebase origin "$BRANCH" 2>/dev/null || true
          done

          if [ "$PUSH_OK" != "true" ]; then
            echo "::warning::Failed to push VQA screenshots after 3 attempts"
            echo "has_screenshots=false" >> "$GITHUB_OUTPUT"
            cd /
            rm -rf "$WORK_DIR"
            exit 0
          fi

          # Build raw URL base
          echo "raw_url_base=${SERVER_URL}/${REPO}/raw/${BRANCH}/${RUN_ID}" >> "$GITHUB_OUTPUT"

          cd /
          rm -rf "$WORK_DIR"

      - name: Comment VQA screenshots on PR
        if: steps.vqa-upload.outputs.has_screenshots == 'true' && steps.pr.outputs.pr_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_PAT }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          IS_REVISION: ${{ steps.pr.outputs.is_revision }}
          RAW_URL_BASE: ${{ steps.vqa-upload.outputs.raw_url_base }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          HAS_BEFORE=$(ls /tmp/vqa-before/*.png 2>/dev/null | head -1)
          HAS_AFTER=$(ls /tmp/vqa-after/*.png 2>/dev/null | head -1)

          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')

          COMMENT="## Visual QA — Before / After\n\n"

          if [ -n "$HAS_BEFORE" ] && [ -n "$HAS_AFTER" ]; then
            COMMENT+="| Page | Before | After |\n"
            COMMENT+="|------|--------|-------|\n"

            for AFTER_IMG in /tmp/vqa-after/*.png; do
              BASENAME=$(basename "$AFTER_IMG")
              BEFORE_IMG="/tmp/vqa-before/${BASENAME}"
              LABEL=$(echo "$BASENAME" | sed 's/\.png$//' | tr '-' ' ')

              AFTER_URL="${RAW_URL_BASE}/vqa-after/${BASENAME}"

              if [ -f "$BEFORE_IMG" ]; then
                BEFORE_URL="${RAW_URL_BASE}/vqa-before/${BASENAME}"
                COMMENT+="| ${LABEL} | ![before](${BEFORE_URL}) | ![after](${AFTER_URL}) |\n"
              else
                COMMENT+="| ${LABEL} | *(no before)* | ![after](${AFTER_URL}) |\n"
              fi
            done
          elif [ -n "$HAS_AFTER" ]; then
            COMMENT+="*(Before screenshots were not captured)*\n\n"
            for AFTER_IMG in /tmp/vqa-after/*.png; do
              BASENAME=$(basename "$AFTER_IMG")
              LABEL=$(echo "$BASENAME" | sed 's/\.png$//' | tr '-' ' ')
              AFTER_URL="${RAW_URL_BASE}/vqa-after/${BASENAME}"
              COMMENT+="- ${LABEL}: ![${LABEL}](${AFTER_URL})\n"
            done
          fi

          COMMENT+="\n---\n*Screenshots also available in [workflow artifacts](${WORKFLOW_URL})*"

          echo -e "$COMMENT" | gh pr comment "$PR_NUMBER" --body-file -

      - name: Upload VQA screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vqa-screenshots
          path: |
            /tmp/vqa-before/
            /tmp/vqa-after/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Claude logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-logs
          path: |
            /tmp/claude_prompt.txt
            /tmp/claude_stream.jsonl
            /tmp/claude_stderr.txt
          if-no-files-found: ignore
          retention-days: 30

      - name: Clean up running label
        if: always() && github.event.inputs.pr_number == ''
        env:
          ISSUE_NUMBER: ${{ needs.classify.outputs.issue_number || github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label "autofix-running" 2>/dev/null || true
