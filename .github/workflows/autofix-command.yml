name: Autofix Command

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

jobs:
  handle-command:
    if: >-
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/autofix')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '/autofix'))
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check permissions
        id: perms
        env:
          COMMENTER_FROM_COMMENT: ${{ github.event.comment.user.login }}
          COMMENTER_FROM_REVIEW: ${{ github.event.review.user.login }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_ID_FROM_COMMENT: ${{ github.event.comment.id }}
          REVIEW_ID_FROM_REVIEW: ${{ github.event.review.id }}
          PR_NUMBER_FOR_REVIEW: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "pull_request_review" ]; then
            COMMENTER="$COMMENTER_FROM_REVIEW"
          else
            COMMENTER="$COMMENTER_FROM_COMMENT"
          fi

          PERMISSION=$(gh api "repos/${REPO}/collaborators/${COMMENTER}/permission" -q '.permission')

          if [ "$PERMISSION" != "admin" ] && [ "$PERMISSION" != "write" ] && [ "$PERMISSION" != "maintain" ]; then
            echo "User ${COMMENTER} has '${PERMISSION}' permission. Write access required."
            if [ "$EVENT_NAME" = "pull_request_review" ]; then
              gh api "repos/${REPO}/pulls/${PR_NUMBER_FOR_REVIEW}/reviews/${REVIEW_ID_FROM_REVIEW}/reactions" \
                -f content='-1' --silent 2>/dev/null || true
            else
              gh api "repos/${REPO}/issues/comments/${COMMENT_ID_FROM_COMMENT}/reactions" \
                -f content='-1' --silent 2>/dev/null || true
            fi
            echo "authorized=false" >> "$GITHUB_OUTPUT"
          else
            echo "authorized=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Acknowledge command
        if: steps.perms.outputs.authorized == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_ID_FROM_COMMENT: ${{ github.event.comment.id }}
          REVIEW_ID_FROM_REVIEW: ${{ github.event.review.id }}
          PR_NUMBER_FOR_REVIEW: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "pull_request_review" ]; then
            gh api "repos/${REPO}/pulls/${PR_NUMBER_FOR_REVIEW}/reviews/${REVIEW_ID_FROM_REVIEW}/reactions" \
              -f content='eyes' --silent 2>/dev/null || true
          else
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID_FROM_COMMENT}/reactions" \
              -f content='eyes' --silent
          fi

      - name: Parse command
        if: steps.perms.outputs.authorized == 'true'
        id: parse
        env:
          COMMENT_BODY_FROM_COMMENT: ${{ github.event.comment.body }}
          COMMENT_BODY_FROM_REVIEW: ${{ github.event.review.body }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER_FROM_REVIEW: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER_FROM_COMMENT: ${{ github.event.issue.number }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request.url && 'true' || 'false' }}
        run: |
          # Normalize comment body
          if [ "$EVENT_NAME" = "pull_request_review" ]; then
            COMMENT_BODY="$COMMENT_BODY_FROM_REVIEW"
          else
            COMMENT_BODY="$COMMENT_BODY_FROM_COMMENT"
          fi

          # Detect PR vs issue context
          if [ "$EVENT_NAME" = "pull_request_review" ]; then
            IS_PR="true"
            PR_NUMBER="$PR_NUMBER_FROM_REVIEW"
            ISSUE_NUMBER="$PR_NUMBER_FROM_REVIEW"
          elif [ "$IS_PR_COMMENT" = "true" ]; then
            IS_PR="true"
            PR_NUMBER="$ISSUE_NUMBER_FROM_COMMENT"
            ISSUE_NUMBER="$ISSUE_NUMBER_FROM_COMMENT"
          else
            IS_PR="false"
            ISSUE_NUMBER="$ISSUE_NUMBER_FROM_COMMENT"
          fi

          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "is_pr=${IS_PR}" >> "$GITHUB_OUTPUT"
          [ "$IS_PR" = "true" ] && echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

          # For issue_comment: commands must start with /autofix (anchored)
          # For pull_request_review: /autofix can appear anywhere (contains)
          if [ "$EVENT_NAME" = "pull_request_review" ]; then
            GREP_PREFIX=""
          else
            GREP_PREFIX="^"
          fi

          if echo "$COMMENT_BODY" | grep -qE "${GREP_PREFIX}/autofix retry"; then
            echo "command=retry" >> "$GITHUB_OUTPUT"
          elif echo "$COMMENT_BODY" | grep -qE "${GREP_PREFIX}/autofix cancel"; then
            echo "command=cancel" >> "$GITHUB_OUTPUT"
          elif echo "$COMMENT_BODY" | grep -qE "${GREP_PREFIX}/autofix status"; then
            echo "command=status" >> "$GITHUB_OUTPUT"
          elif echo "$COMMENT_BODY" | grep -qE "${GREP_PREFIX}/autofix (model=|turns=)"; then
            MODEL=$(echo "$COMMENT_BODY" | sed -n 's|.*/autofix.*model=\([^ ]*\).*|\1|p')
            TURNS=$(echo "$COMMENT_BODY" | sed -n 's|.*/autofix.*turns=\([^ ]*\).*|\1|p')
            echo "command=retry" >> "$GITHUB_OUTPUT"
            [ -n "$MODEL" ] && echo "model_override=${MODEL}" >> "$GITHUB_OUTPUT"
            [ -n "$TURNS" ] && echo "max_turns_override=${TURNS}" >> "$GITHUB_OUTPUT"
          else
            echo "command=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Handle retry
        if: steps.perms.outputs.authorized == 'true' && steps.parse.outputs.command == 'retry'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.parse.outputs.issue_number }}
          IS_PR: ${{ steps.parse.outputs.is_pr }}
          PR_NUMBER: ${{ steps.parse.outputs.pr_number }}
          MODEL_OVERRIDE: ${{ steps.parse.outputs.model_override }}
          TURNS_OVERRIDE: ${{ steps.parse.outputs.max_turns_override }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REVIEW_ID: ${{ github.event.review.id }}
          PR_NUMBER_FOR_REVIEW: ${{ github.event.pull_request.number }}
        run: |

          DISPATCH_ARGS=(-f issue_number="$ISSUE_NUMBER")

          if [ "$IS_PR" = "true" ]; then
            # Resolve linked issue number from PR body
            LINKED_ISSUE=$(gh pr view "$PR_NUMBER" --json body -q '.body' \
              | grep -ioE '(fixes|closes|resolves) #[0-9]+' | head -1 | grep -oE '[0-9]+')
            if [ -n "$LINKED_ISSUE" ]; then
              DISPATCH_ARGS=(-f issue_number="$LINKED_ISSUE")
            fi
            DISPATCH_ARGS+=(-f pr_number="$PR_NUMBER")
          fi

          [ -n "$MODEL_OVERRIDE" ] && DISPATCH_ARGS+=(-f model_override="$MODEL_OVERRIDE")
          [ -n "$TURNS_OVERRIDE" ] && DISPATCH_ARGS+=(-f max_turns_override="$TURNS_OVERRIDE")

          gh workflow run autofix.yml "${DISPATCH_ARGS[@]}"

          if [ "$IS_PR" = "true" ]; then
            gh pr edit "$PR_NUMBER" --remove-label "autofix-failed" 2>/dev/null || true
          else
            gh issue edit "$ISSUE_NUMBER" --remove-label "autofix-failed" 2>/dev/null || true
          fi

          # React with rocket — handle both event types
          if [ "$EVENT_NAME" = "pull_request_review" ]; then
            gh api "repos/${REPO}/pulls/${PR_NUMBER_FOR_REVIEW}/reviews/${REVIEW_ID}/reactions" \
              -f content='rocket' --silent 2>/dev/null || true
          else
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
              -f content='rocket' --silent 2>/dev/null || true
          fi

      - name: Handle cancel
        if: steps.perms.outputs.authorized == 'true' && steps.parse.outputs.command == 'cancel'
        env:
          ISSUE_NUMBER: ${{ steps.parse.outputs.issue_number }}
          IS_PR: ${{ steps.parse.outputs.is_pr }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REVIEW_ID: ${{ github.event.review.id }}
          PR_NUMBER_FOR_REVIEW: ${{ github.event.pull_request.number }}
        run: |
          RUNS=$(gh run list --workflow=autofix.yml --status=in_progress --json databaseId -q '.[].databaseId')

          CANCELLED=0
          for RUN_ID in $RUNS; do
            gh run cancel "$RUN_ID" 2>/dev/null && CANCELLED=$((CANCELLED + 1))
          done

          if [ "$IS_PR" = "true" ]; then
            gh pr edit "$ISSUE_NUMBER" --remove-label "autofix-running" 2>/dev/null || true
          else
            gh issue edit "$ISSUE_NUMBER" --remove-label "autofix-running" 2>/dev/null || true
          fi

          # React — handle both event types
          if [ "$EVENT_NAME" = "pull_request_review" ]; then
            gh api "repos/${REPO}/pulls/${PR_NUMBER_FOR_REVIEW}/reviews/${REVIEW_ID}/reactions" \
              -f content='octagonal_sign' --silent 2>/dev/null || true
          else
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
              -f content='octagonal_sign' --silent 2>/dev/null || true
          fi

          gh issue comment "$ISSUE_NUMBER" --body "Autofix cancelled. ${CANCELLED} workflow run(s) stopped."

      - name: Handle status
        if: steps.perms.outputs.authorized == 'true' && steps.parse.outputs.command == 'status'
        env:
          ISSUE_NUMBER: ${{ steps.parse.outputs.issue_number }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REVIEW_ID: ${{ github.event.review.id }}
          PR_NUMBER_FOR_REVIEW: ${{ github.event.pull_request.number }}
        run: |

          LATEST_RUN=$(gh run list --workflow=autofix.yml --limit 5 --json databaseId,status,conclusion,createdAt,url \
            -q 'sort_by(.createdAt) | reverse | .[0]')

          if [ -z "$LATEST_RUN" ] || [ "$LATEST_RUN" = "null" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "No autofix workflow runs found."
          else
            RUN_STATUS=$(echo "$LATEST_RUN" | jq -r '.status')
            RUN_CONCLUSION=$(echo "$LATEST_RUN" | jq -r '.conclusion // "n/a"')
            RUN_URL=$(echo "$LATEST_RUN" | jq -r '.url')
            RUN_CREATED=$(echo "$LATEST_RUN" | jq -r '.createdAt')

            gh issue comment "$ISSUE_NUMBER" --body "## Autofix Status

          | Field | Value |
          |-------|-------|
          | **Status** | ${RUN_STATUS} |
          | **Conclusion** | ${RUN_CONCLUSION} |
          | **Started** | ${RUN_CREATED} |
          | **Run** | [View workflow run](${RUN_URL}) |"
          fi

          # React — handle both event types
          if [ "$EVENT_NAME" = "pull_request_review" ]; then
            gh api "repos/${REPO}/pulls/${PR_NUMBER_FOR_REVIEW}/reviews/${REVIEW_ID}/reactions" \
              -f content='chart_with_upwards_trend' --silent 2>/dev/null || true
          else
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
              -f content='chart_with_upwards_trend' --silent 2>/dev/null || true
          fi

      - name: Handle unknown command
        if: steps.perms.outputs.authorized == 'true' && steps.parse.outputs.command == 'unknown'
        env:
          ISSUE_NUMBER: ${{ steps.parse.outputs.issue_number }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REVIEW_ID: ${{ github.event.review.id }}
          PR_NUMBER_FOR_REVIEW: ${{ github.event.pull_request.number }}
        run: |
          # React — handle both event types
          if [ "$EVENT_NAME" = "pull_request_review" ]; then
            gh api "repos/${REPO}/pulls/${PR_NUMBER_FOR_REVIEW}/reviews/${REVIEW_ID}/reactions" \
              -f content='question' --silent 2>/dev/null || true
          else
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
              -f content='question' --silent 2>/dev/null || true
          fi

          gh issue comment "$ISSUE_NUMBER" --body "### Autofix Commands

          | Command | Description |
          |---------|-------------|
          | \`/autofix retry\` | Re-run autofix (on issue: from scratch; on PR: incorporate review feedback) |
          | \`/autofix cancel\` | Cancel the running autofix workflow |
          | \`/autofix status\` | Show the latest workflow run status |
          | \`/autofix model=<id>\` | Retry with a specific Bedrock model ID |

          *Requires write access to this repository.*"
