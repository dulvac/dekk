name: Autoreview Command

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  handle-command:
    if: >-
      (github.event.issue.pull_request && contains(github.event.comment.body, '/autoreview')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '/autoreview')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '/autoreview'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve PR number and reaction endpoint
        id: pr
        env:
          REPO: ${{ github.repository }}
        run: |
          # Determine PR number and the correct reaction API endpoint based on trigger type
          EVENT_NAME="${{ github.event_name }}"

          if [ "$EVENT_NAME" = "issue_comment" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
            REACT_ENDPOINT="repos/${REPO}/issues/comments/${{ github.event.comment.id }}/reactions"
          elif [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            REACT_ENDPOINT="repos/${REPO}/pulls/comments/${{ github.event.comment.id }}/reactions"
          elif [ "$EVENT_NAME" = "pull_request_review" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            REACT_ENDPOINT="repos/${REPO}/pulls/${PR_NUMBER}/reviews/${{ github.event.review.id }}/reactions"
          fi

          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "react_endpoint=${REACT_ENDPOINT}" >> "$GITHUB_OUTPUT"

      - name: Acknowledge command
        env:
          REACT_ENDPOINT: ${{ steps.pr.outputs.react_endpoint }}
        run: |
          # React with eyes to acknowledge receipt
          gh api "${REACT_ENDPOINT}" --method POST -f content="eyes" 2>/dev/null || true

      - name: Check permissions
        env:
          SENDER: ${{ github.event.sender.login }}
          REPO: ${{ github.repository }}
          REACT_ENDPOINT: ${{ steps.pr.outputs.react_endpoint }}
        run: |
          PERM=$(gh api "repos/${REPO}/collaborators/${SENDER}/permission" --jq '.permission')
          if [[ "$PERM" != "admin" && "$PERM" != "maintain" && "$PERM" != "write" ]]; then
            echo "User ${SENDER} does not have write access. Ignoring command."
            gh api "${REACT_ENDPOINT}" --method POST -f content="-1" 2>/dev/null || true
            exit 0
          fi

      - name: Trigger autoreview workflow
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
          REACT_ENDPOINT: ${{ steps.pr.outputs.react_endpoint }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          # Remove old status labels
          gh pr edit "$PR_NUMBER" --remove-label "autoreview-complete" 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --remove-label "autoreview-failed" 2>/dev/null || true

          # Trigger the main autoreview workflow via workflow_dispatch
          gh workflow run autoreview.yml -f pr_number="$PR_NUMBER" --ref "$DEFAULT_BRANCH"

          # React with rocket to confirm dispatch
          gh api "${REACT_ENDPOINT}" --method POST -f content="rocket" 2>/dev/null || true
