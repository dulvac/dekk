name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build for GitHub Pages
        run: npm run build -- --base /dekk/

      - name: Build CLI
        run: npm run build:cli

      - name: Run unit tests
        run: npx vitest run

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (chromium project - GitHub Pages build)
        run: npx playwright test --project=chromium

      # Upload Pages artifact BEFORE the CLI rebuild below, which overwrites
      # dist/ with a build that has no --base prefix (breaking Pages routing).
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

      # CLI tests need a plain build (no --base /dekk/), so rebuild here.
      # This overwrites dist/ but the Pages artifact is already captured above.
      - name: Rebuild SPA for CLI tests (no base prefix)
        run: npm run build

      - name: Run E2E tests (CLI project)
        run: npx playwright test --project=cli

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
